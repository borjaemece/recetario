<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Recetario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f9f5ef;
  --card: #ffffff;
  --accent: #b85c2a;
  --accent-light: #f0ddd0;
  --text: #1e160a;
  --muted: #8a7968;
  --border: #e4dcd2;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
  --subcat-bg: #eef4f0;
  --subcat-color: #3a6b4a;
  --subcat-border: #c5dece;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── HEADER ── */
header {
  background: var(--text);
  color: var(--bg);
  padding: 24px 18px 18px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 14px;
}
header h1 {
  font-family: var(--serif);
  font-size: 1.55rem;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.header-count {
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.search-wrap {
  position: relative;
}
.search-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.4;
}
#search {
  width: 100%;
  padding: 9px 14px 9px 36px;
  border-radius: 8px;
  border: none;
  font-size: 0.9rem;
  background: rgba(255,255,255,0.1);
  color: var(--bg);
  outline: none;
  font-family: var(--sans);
}
#search::placeholder { color: rgba(249,245,239,0.45); }

/* ── TABS (categorías principales) ── */
.tabs {
  display: flex;
  overflow-x: auto;
  gap: 6px;
  padding: 10px 18px 0;
  background: var(--card);
  border-bottom: none;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 5px 14px;
  border-radius: 6px 6px 0 0;
  border: 1.5px solid var(--border);
  border-bottom: none;
  background: var(--bg);
  color: var(--muted);
  font-size: 0.8rem;
  font-family: var(--sans);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab.active {
  background: var(--card);
  border-color: var(--border);
  color: var(--text);
  font-weight: 500;
}

/* ── SUBTABS (subcategorías) ── */
.subtabs-wrap {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 8px 18px;
}
.subtabs {
  display: flex;
  overflow-x: auto;
  gap: 6px;
  scrollbar-width: none;
}
.subtabs::-webkit-scrollbar { display: none; }
.subtab {
  flex-shrink: 0;
  padding: 4px 11px;
  border-radius: 20px;
  border: 1.5px solid var(--subcat-border);
  background: transparent;
  color: var(--subcat-color);
  font-size: 0.75rem;
  font-family: var(--sans);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.subtab.active {
  background: var(--subcat-color);
  border-color: var(--subcat-color);
  color: white;
  font-weight: 500;
}

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 16px 18px;
}

/* ── CARD ── */
.card {
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s;
}
.card:active { transform: scale(0.97); box-shadow: none; }
.card-thumb {
  height: 72px;
  background: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  position: relative;
}
.card-type-badge {
  position: absolute;
  bottom: 6px;
  right: 8px;
  font-size: 0.65rem;
  background: rgba(0,0,0,0.12);
  color: var(--text);
  padding: 1px 6px;
  border-radius: 4px;
}
.card-body { padding: 10px 11px 12px; }
.card-name {
  font-family: var(--serif);
  font-size: 0.88rem;
  font-weight: 500;
  line-height: 1.25;
  margin-bottom: 4px;
}
.card-cat {
  font-size: 0.7rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  font-weight: 500;
}
.card-subcat {
  font-size: 0.66rem;
  color: var(--subcat-color);
  margin-top: 3px;
  background: var(--subcat-bg);
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
}

/* ── EMPTY ── */
.empty {
  grid-column: 1/-1;
  text-align: center;
  color: var(--muted);
  padding: 50px 20px;
  font-size: 0.92rem;
  line-height: 1.8;
}
.empty strong { font-family: var(--serif); font-size: 1.1rem; color: var(--text); }

/* ── OVERLAY / MODAL ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,6,2,0.6);
  z-index: 200;
  align-items: flex-end;
  backdrop-filter: blur(2px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--card);
  border-radius: 18px 18px 0 0;
  width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  padding: 22px 20px 48px;
  animation: slideUp 0.22s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 4px;
}
.modal-close {
  flex-shrink: 0;
  background: var(--bg);
  border: none;
  border-radius: 50%;
  width: 30px; height: 30px;
  font-size: 1rem;
  cursor: pointer;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
}
.modal-emoji { font-size: 2.8rem; margin-bottom: 8px; }
.modal h2 {
  font-family: var(--serif);
  font-size: 1.3rem;
  line-height: 1.2;
  margin-bottom: 6px;
}
.badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.badge {
  display: inline-block;
  background: var(--accent-light);
  color: var(--accent);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 0.73rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge-sub {
  display: inline-block;
  background: var(--subcat-bg);
  color: var(--subcat-color);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 0.73rem;
  font-weight: 500;
  letter-spacing: 0.3px;
  border: 1px solid var(--subcat-border);
}
.modal-historia {
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.65;
  margin-bottom: 16px;
  font-style: italic;
}
.modal-section { margin-top: 18px; }
.modal-section h3 {
  font-family: var(--serif);
  font-size: 0.82rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.ingredients { list-style: none; }
.ingredients li {
  font-size: 0.88rem;
  padding: 5px 0;
  border-bottom: 1px dashed var(--border);
  display: flex;
  gap: 8px;
  align-items: baseline;
}
.ingredients li::before {
  content: '—';
  color: var(--accent);
  flex-shrink: 0;
  font-size: 0.75rem;
}
.steps { list-style: none; }
.steps li {
  font-size: 0.88rem;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: flex-start;
  line-height: 1.5;
}
.step-num {
  flex-shrink: 0;
  width: 20px; height: 20px;
  background: var(--text);
  color: var(--bg);
  border-radius: 50%;
  font-size: 0.7rem;
  display: flex; align-items: center; justify-content: center;
  font-weight: 500;
  margin-top: 2px;
}
.modal-link {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 18px;
  background: var(--text);
  color: var(--bg);
  padding: 13px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 0.92rem;
  font-weight: 500;
}
.modal-notes {
  font-size: 0.85rem;
  color: var(--muted);
  font-style: italic;
  margin-top: 8px;
  line-height: 1.6;
  background: var(--accent-light);
  padding: 10px 12px;
  border-radius: 8px;
  border-left: 3px solid var(--accent);
}

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: 24px; right: 20px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 50%;
  width: 54px; height: 54px;
  font-size: 1.5rem;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(184,92,42,0.4);
  z-index: 150;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.fab:active { transform: scale(0.92); }

/* ── FORM ── */
.form-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,6,2,0.6);
  z-index: 300;
  align-items: flex-end;
  backdrop-filter: blur(2px);
}
.form-overlay.open { display: flex; }
.form-modal {
  background: var(--card);
  border-radius: 18px 18px 0 0;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 22px 20px 50px;
  animation: slideUp 0.22s ease;
}
.form-modal h2 {
  font-family: var(--serif);
  font-size: 1.1rem;
  margin-bottom: 18px;
}
.field { margin-bottom: 13px; }
.field label {
  font-size: 0.73rem;
  color: var(--muted);
  display: block;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 500;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 0.9rem;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent);
}
.field textarea { resize: vertical; min-height: 80px; }
.form-row { display: flex; gap: 10px; }
.form-row .field { flex: 1; }
.btn-save {
  width: 100%;
  background: var(--text);
  color: var(--bg);
  border: none;
  padding: 13px;
  border-radius: 10px;
  font-size: 0.95rem;
  font-family: var(--sans);
  font-weight: 500;
  cursor: pointer;
  margin-top: 8px;
}
.btn-cancel {
  width: 100%;
  background: transparent;
  color: var(--muted);
  border: 1.5px solid var(--border);
  padding: 11px;
  border-radius: 10px;
  font-size: 0.88rem;
  font-family: var(--sans);
  cursor: pointer;
  margin-top: 8px;
}

/* ── LOADING ── */
.loading {
  grid-column: 1/-1;
  text-align: center;
  color: var(--muted);
  padding: 50px 20px;
  font-size: 0.9rem;
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Mi Recetario</h1>
    <span class="header-count" id="count"></span>
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Buscar receta o ingrediente…" oninput="render()">
  </div>
</header>

<!-- Tabs de categorías -->
<div class="tabs" id="tabs"></div>

<!-- Subtabs de subcategorías -->
<div class="subtabs-wrap">
  <div class="subtabs" id="subtabs"></div>
</div>

<div class="grid" id="grid"><div class="loading">Cargando recetas…</div></div>

<!-- Modal detalle receta -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>

<!-- Formulario nueva receta -->
<div class="form-overlay" id="formOverlay" onclick="closeForm(event)">
  <div class="form-modal">
    <div class="modal-header">
      <h2>Nueva receta</h2>
      <button class="modal-close" onclick="document.getElementById('formOverlay').classList.remove('open')">✕</button>
    </div>
    <div class="field">
      <label>Nombre *</label>
      <input id="f-name" type="text" placeholder="Ej: Paella valenciana">
    </div>
    <div class="form-row">
      <div class="field">
        <label>Categoría *</label>
        <select id="f-cat">
          <option value="Entrante">Entrante</option>
          <option value="Principal">Principal</option>
          <option value="Postre">Postre</option>
          <option value="Desayuno">Desayuno</option>
          <option value="Bebida">Bebida</option>
          <option value="Salsa">Salsa, aliño o condimento</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
      <div class="field">
        <label>Emoji</label>
        <input id="f-emoji" type="text" placeholder="🍝" maxlength="2">
      </div>
    </div>
    <div class="field">
      <label>Subcategoría</label>
      <select id="f-subcat">
        <option value="">— Sin subcategoría —</option>
        <option value="Cocina asiática picante">Cocina asiática picante</option>
        <option value="Cocina taiwanesa">Cocina taiwanesa</option>
        <option value="Cocina tailandesa">Cocina tailandesa</option>
        <option value="Cocina turca">Cocina turca</option>
        <option value="Cocina coreana">Cocina coreana</option>
        <option value="Cocina mexicana">Cocina mexicana</option>
        <option value="Cocina siria">Cocina siria</option>
        <option value="Cocina del Magreb">Cocina del Magreb</option>
        <option value="Dumplings">Dumplings</option>
        <option value="Hofmann">Hofmann</option>
        <option value="Web">Web</option>
        <option value="Cocina india">Cocina india</option>
      </select>
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="f-type" onchange="toggleFields()">
        <option value="texto">Receta escrita</option>
        <option value="enlace">Enlace a web</option>
        <option value="pdf">PDF / Archivo</option>
      </select>
    </div>
    <div id="f-text-fields">
      <div class="field">
        <label>Ingredientes (uno por línea)</label>
        <textarea id="f-ingredients" placeholder="200g harina&#10;2 huevos&#10;1 limón…"></textarea>
      </div>
      <div class="field">
        <label>Pasos (uno por línea)</label>
        <textarea id="f-steps" placeholder="Mezclar harina con huevos&#10;Hornear 30 min…"></textarea>
      </div>
    </div>
    <div id="f-link-fields" style="display:none">
      <div class="field">
        <label>URL</label>
        <input id="f-url" type="url" placeholder="https://…">
      </div>
    </div>
    <div class="field">
      <label>Mis notas (opcional)</label>
      <input id="f-notes" type="text" placeholder="Ej: Doblar cantidades para 6 personas">
    </div>
    <button class="btn-save" onclick="saveRecipe()">Guardar receta</button>
    <button class="btn-cancel" onclick="document.getElementById('formOverlay').classList.remove('open')">Cancelar</button>
  </div>
</div>

<button class="fab" onclick="openForm()" aria-label="Añadir receta">+</button>

<script>
const CATS = ['Todas', 'Entrante', 'Principal', 'Postre', 'Desayuno', 'Bebida', 'Salsa', 'Otro'];
const CAT_LABELS = {
  Todas: 'Todas',
  Entrante: 'Entrantes',
  Principal: 'Principales',
  Postre: 'Postres',
  Desayuno: 'Desayunos',
  Bebida: 'Bebidas',
  Salsa: 'Salsas y aliños',
  Otro: 'Otros'
};
const CAT_EMOJI = {
  Entrante: '🥗',
  Principal: '🍽️',
  Postre: '🍮',
  Desayuno: '🥐',
  Bebida: '🥤',
  Salsa: '🫙',
  Otro: '📌'
};
const TYPE_LABEL = { texto: 'Escrita', enlace: 'Web', pdf: 'PDF' };

const SUBCATS = [
  'Cocina asiática picante',
  'Cocina taiwanesa',
  'Cocina tailandesa',
  'Cocina turca',
  'Cocina coreana',
  'Cocina mexicana',
  'Cocina siria',
  'Cocina del Magreb',
  'Dumplings',
  'Hofmann',
  'Web',
  'Cocina india'
];

let recipes = [];
let activeTab = 'Todas';
let activeSubTab = 'Todas';

// ── Cargar recetas ──
async function loadRecipes() {
  try {
    const res = await fetch('recetas.json');
    if (!res.ok) throw new Error('No se pudo cargar recetas.json');
    recipes = await res.json();
    const local = JSON.parse(localStorage.getItem('recetas_extra') || '[]');
    recipes = [...recipes, ...local];
    render();
  } catch (e) {
    recipes = JSON.parse(localStorage.getItem('recetas_extra') || '[]');
    render();
    if (recipes.length === 0) {
      document.getElementById('grid').innerHTML =
        '<div class="empty"><strong>Sin recetas todavía</strong><br>Pulsa + para añadir tu primera receta.</div>';
    }
  }
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();

  document.getElementById('count').textContent = recipes.length + ' recetas';

  // ── Tabs de categorías ──
  const usedCats = new Set(recipes.map(r => r.categoria));
  const visibleCats = CATS.filter(c => c === 'Todas' || usedCats.has(c));
  document.getElementById('tabs').innerHTML = visibleCats.map(c =>
    `<div class="tab${c === activeTab ? ' active' : ''}" onclick="setTab('${c}')">${CAT_LABELS[c] || c}</div>`
  ).join('');

  // ── Subtabs de subcategorías ──
  const recipesInCat = recipes.filter(r => activeTab === 'Todas' || r.categoria === activeTab);
  const usedSubcats = new Set(recipesInCat.map(r => r.subcategoria).filter(Boolean));
  const visibleSubcats = SUBCATS.filter(s => usedSubcats.has(s));

  const subtabsWrap = document.querySelector('.subtabs-wrap');
  if (visibleSubcats.length > 0) {
    subtabsWrap.style.display = '';
    document.getElementById('subtabs').innerHTML =
      `<div class="subtab${activeSubTab === 'Todas' ? ' active' : ''}" onclick="setSubTab('Todas')">Todas</div>` +
      visibleSubcats.map(s =>
        `<div class="subtab${s === activeSubTab ? ' active' : ''}" onclick="setSubTab('${s}')">${s}</div>`
      ).join('');
  } else {
    subtabsWrap.style.display = 'none';
  }

  // ── Filtrar recetas ──
  const filtered = recipes.filter(r => {
    const matchCat = activeTab === 'Todas' || r.categoria === activeTab;
    const matchSub = activeSubTab === 'Todas' || r.subcategoria === activeSubTab;
    const matchQ = !q
      || r.nombre.toLowerCase().includes(q)
      || (r.ingredientes || []).some(i => i.toLowerCase().includes(q));
    return matchCat && matchSub && matchQ;
  });

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><strong>Sin resultados</strong><br>Prueba con otro término o categoría.</div>';
    return;
  }
  grid.innerHTML = filtered.map(r => `
    <div class="card" onclick="openModal(${r.id})">
      <div class="card-thumb">
        ${r.emoji || CAT_EMOJI[r.categoria] || '🍴'}
        <span class="card-type-badge">${TYPE_LABEL[r.tipo] || r.tipo}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${r.nombre}</div>
        <div class="card-cat">${CAT_LABELS[r.categoria] || r.categoria}</div>
        ${r.subcategoria ? `<div class="card-subcat">${r.subcategoria}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function setTab(c) {
  activeTab = c;
  activeSubTab = 'Todas';
  render();
}

function setSubTab(s) {
  activeSubTab = s;
  render();
}

function openModal(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  let html = `
    <div class="modal-header">
      <div></div>
      <button class="modal-close" onclick="document.getElementById('overlay').classList.remove('open')">✕</button>
    </div>
    <div class="modal-emoji">${r.emoji || CAT_EMOJI[r.categoria] || '🍴'}</div>
    <h2>${r.nombre}</h2>
    <div class="badges">
      <span class="badge">${CAT_LABELS[r.categoria] || r.categoria}</span>
      ${r.subcategoria ? `<span class="badge-sub">${r.subcategoria}</span>` : ''}
    </div>
  `;
  if (r.historia) {
    html += `<p class="modal-historia">${r.historia}</p>`;
  }
  if (r.tipo === 'enlace' || r.tipo === 'pdf') {
    const icon = r.tipo === 'pdf' ? '📄' : '🔗';
    const label = r.tipo === 'pdf' ? 'Abrir PDF' : 'Ver receta en web';
    html += `<a class="modal-link" href="${r.url}" target="_blank">${icon} ${label}</a>`;
  } else {
    if (r.ingredientes?.length) {
      html += `<div class="modal-section"><h3>Ingredientes</h3><ul class="ingredients">
        ${r.ingredientes.map(i => `<li>${i}</li>`).join('')}
      </ul></div>`;
    }
    if (r.pasos?.length) {
      html += `<div class="modal-section"><h3>Elaboración</h3><ul class="steps">
        ${r.pasos.map((s, i) => `<li><span class="step-num">${i + 1}</span><span>${s}</span></li>`).join('')}
      </ul></div>`;
    }
  }
  if (r.notas) {
    html += `<div class="modal-section"><h3>Mis notas</h3><p class="modal-notes">${r.notas}</p></div>`;
  }
  document.getElementById('modal').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}

function openForm() { document.getElementById('formOverlay').classList.add('open'); }
function closeForm(e) {
  if (e.target === document.getElementById('formOverlay'))
    document.getElementById('formOverlay').classList.remove('open');
}
function toggleFields() {
  const t = document.getElementById('f-type').value;
  document.getElementById('f-text-fields').style.display = t === 'texto' ? '' : 'none';
  document.getElementById('f-link-fields').style.display = t !== 'texto' ? '' : 'none';
}

function saveRecipe() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('El nombre es obligatorio'); return; }
  const type = document.getElementById('f-type').value;
  const r = {
    id: Date.now(),
    nombre: name,
    categoria: document.getElementById('f-cat').value,
    subcategoria: document.getElementById('f-subcat').value || undefined,
    emoji: document.getElementById('f-emoji').value.trim() || CAT_EMOJI[document.getElementById('f-cat').value],
    tipo: type,
    notas: document.getElementById('f-notes').value.trim()
  };
  if (type === 'texto') {
    r.ingredientes = document.getElementById('f-ingredients').value.split('\n').map(s => s.trim()).filter(Boolean);
    r.pasos = document.getElementById('f-steps').value.split('\n').map(s => s.trim()).filter(Boolean);
  } else {
    r.url = document.getElementById('f-url').value.trim();
  }
  const local = JSON.parse(localStorage.getItem('recetas_extra') || '[]');
  local.push(r);
  localStorage.setItem('recetas_extra', JSON.stringify(local));
  recipes.push(r);
  ['f-name', 'f-emoji', 'f-ingredients', 'f-steps', 'f-url', 'f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-type').value = 'texto';
  document.getElementById('f-subcat').value = '';
  toggleFields();
  document.getElementById('formOverlay').classList.remove('open');
  render();
}

loadRecipes();
</script>
</body>
</html>
