<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Recetario</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --rojo: #D42B2B;
  --rojo-oscuro: #A01E1E;
  --rojo-claro: #F5C2C2;
  --amarillo: #F5C400;
  --amarillo-claro: #FFF4B8;
  --naranja: #F07020;
  --naranja-claro: #FDDCBF;
  --bg: #FFFFFF;
  --bg-alt: #F7F7F7;
  --card: #FFFFFF;
  --negro: #1A1A1A;
  --gris-texto: #4A4A4A;
  --gris-medio: #8A8A8A;
  --gris-borde: #E8E8E8;
  --gris-pill: #F2F2F2;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--negro);
  min-height: 100vh;
  padding-bottom: 140px;
}

/* ── HEADER ── */
header {
  background: var(--rojo);
  color: white;
  padding: 28px 24px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(212,43,43,0.25);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.header-label {
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  opacity: 0.7;
  margin-bottom: 2px;
}
header h1 {
  font-family: var(--serif);
  font-size: 1.7rem;
  font-weight: 900;
  letter-spacing: -0.5px;
  line-height: 1;
}
.header-count {
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 50px;
  letter-spacing: 0.05em;
}
.search-wrap {
  position: relative;
}
.search-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.5;
  pointer-events: none;
}
#search {
  width: 100%;
  padding: 11px 16px 11px 40px;
  border-radius: 50px;
  border: none;
  font-size: 0.88rem;
  background: rgba(255,255,255,0.18);
  color: white;
  outline: none;
  font-family: var(--sans);
  font-weight: 400;
  transition: background 0.2s;
}
#search::placeholder { color: rgba(255,255,255,0.55); }
#search:focus { background: rgba(255,255,255,0.28); }

/* ── FILTROS: DOS FILAS DE PILLS ── */
.filters-wrap {
  background: var(--bg);
  border-bottom: 1px solid var(--gris-borde);
  position: sticky;
  top: 112px;
  z-index: 90;
}
.filter-row {
  padding: 10px 16px 8px;
  border-bottom: 1px solid var(--gris-borde);
}
.filter-row:last-child {
  border-bottom: none;
  background: var(--bg-alt);
  padding: 8px 16px 10px;
}
.filter-row-label {
  font-size: 0.57rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gris-medio);
  margin-bottom: 7px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.filter-row-label span {
  font-size: 0.75rem;
  line-height: 1;
}
.pills-scroll {
  display: flex;
  gap: 5px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.pills-scroll::-webkit-scrollbar { display: none; }

.pill {
  flex-shrink: 0;
  padding: 6px 13px;
  border-radius: 50px;
  font-size: 0.73rem;
  font-weight: 500;
  font-family: var(--sans);
  cursor: pointer;
  border: none;
  background: var(--gris-pill);
  color: var(--gris-texto);
  transition: all 0.15s;
  white-space: nowrap;
  line-height: 1.3;
}
.pill:hover { background: #E5E5E5; color: var(--negro); }
.pill.active-cat { background: var(--rojo); color: white; }
.pill.active-org { background: var(--negro); color: white; }

/* ── GRID DE TARJETAS ── */
.grid {
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── TARJETA ── */
.card {
  background: var(--card);
  border-radius: 16px;
  border: 1.5px solid var(--gris-borde);
  display: flex;
  align-items: stretch;
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
  overflow: hidden;
}
.card:hover {
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  transform: translateY(-2px);
  border-color: transparent;
}
.card-thumb {
  width: 76px;
  min-height: 76px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  flex-shrink: 0;
  background: var(--rojo-claro);
  position: relative;
}
.card-thumb.color-amarillo { background: var(--amarillo-claro); }
.card-thumb.color-naranja { background: var(--naranja-claro); }
.card-thumb.color-rojo { background: var(--rojo-claro); }

.card-type-badge {
  position: absolute;
  bottom: 5px;
  right: 5px;
  font-size: 0.45rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: rgba(255,255,255,0.8);
  color: var(--gris-texto);
  padding: 2px 5px;
  border-radius: 4px;
}

/* ── TARJETA: INDICADOR COCINADA ── */
.card-cooked-dot {
  position: absolute;
  bottom: 5px;
  left: 5px;
  width: 18px;
  height: 18px;
  background: #22c55e;
  border-radius: 50%;
  border: 2px solid white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.55rem;
  color: white;
  font-weight: 900;
  line-height: 1;
}
.card-name.cooked-name { color: var(--gris-medio); }

.card-body {
  padding: 13px 12px 13px 14px;
  flex: 1;
  min-width: 0;
}
.card-cat {
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--rojo);
  margin-bottom: 3px;
}
.card-name {
  font-family: var(--serif);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--negro);
  line-height: 1.3;
  margin-bottom: 7px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.tag {
  font-size: 0.6rem;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 50px;
  background: var(--gris-pill);
  color: var(--gris-texto);
}
.card-arrow {
  display: flex;
  align-items: center;
  padding: 0 14px 0 8px;
  color: var(--gris-borde);
  font-size: 1.2rem;
  font-weight: 300;
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  color: var(--gris-medio);
  padding: 60px 20px;
  font-size: 0.9rem;
  line-height: 1.7;
}
.empty strong { color: var(--negro); display: block; font-size: 1rem; margin-bottom: 4px; }

/* ── MODAL DETALLE ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,26,26,0.55);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg);
  border-radius: 24px 24px 0 0;
  padding: 0 0 40px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(40px);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.overlay.open .modal { transform: translateY(0); }

.modal-handle {
  display: flex;
  justify-content: center;
  padding: 12px 0 4px;
}
.modal-handle div {
  width: 36px;
  height: 4px;
  background: var(--gris-borde);
  border-radius: 2px;
}
.modal-header {
  display: flex;
  justify-content: flex-end;
  padding: 8px 20px 0;
}
.modal-close {
  background: var(--gris-pill);
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 0.85rem;
  color: var(--gris-texto);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--sans);
  transition: background 0.15s;
}
.modal-close:hover { background: var(--gris-borde); }
.modal-emoji { text-align: center; font-size: 3rem; margin: 8px 0 12px; }
.modal h2 {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 900;
  text-align: center;
  padding: 0 24px;
  line-height: 1.2;
  margin-bottom: 10px;
}
.badges {
  display: flex;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
  padding: 0 24px;
  margin-bottom: 16px;
}
.badge {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 50px;
  background: var(--rojo);
  color: white;
}
.badge-sub {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 50px;
  background: var(--gris-pill);
  color: var(--gris-texto);
  border: 1px solid var(--gris-borde);
}

/* ── MODAL: BOTÓN COCINADA ── */
.btn-cooked {
  width: calc(100% - 40px);
  margin: 0 20px 16px;
  border: none;
  padding: 14px;
  border-radius: 50px;
  font-size: 0.92rem;
  font-family: var(--sans);
  font-weight: 600;
  cursor: pointer;
  display: block;
  transition: background 0.15s, transform 0.15s;
  letter-spacing: 0.01em;
}
.btn-cooked.pending {
  background: var(--rojo);
  color: white;
  box-shadow: 0 4px 12px rgba(212,43,43,0.3);
}
.btn-cooked.pending:hover { background: var(--rojo-oscuro); transform: translateY(-1px); }
.btn-cooked.done {
  background: #22c55e;
  color: white;
  box-shadow: 0 4px 12px rgba(34,197,94,0.3);
}
.btn-cooked.done:hover { background: #16a34a; transform: translateY(-1px); }

.modal-historia {
  font-size: 0.85rem;
  color: var(--gris-texto);
  line-height: 1.7;
  padding: 16px 24px;
  background: var(--bg-alt);
  border-left: 3px solid var(--rojo);
  margin: 0 20px 20px;
  border-radius: 0 8px 8px 0;
  font-style: italic;
}
.modal-link {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 0 20px 20px;
  padding: 14px;
  background: var(--rojo);
  color: white;
  border-radius: 50px;
  font-weight: 600;
  font-size: 0.9rem;
  text-decoration: none;
  box-shadow: 0 4px 12px rgba(212,43,43,0.3);
  transition: background 0.15s, transform 0.15s;
}
.modal-link:hover { background: var(--rojo-oscuro); transform: translateY(-1px); }
.modal-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 0 20px 20px;
  justify-content: center;
}
.meta-pill {
  font-size: 0.7rem;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 50px;
  background: var(--gris-pill);
  color: var(--gris-texto);
  border: 1px solid var(--gris-borde);
}
.modal-section { padding: 0 20px 20px; }
.modal-section h3 {
  font-family: var(--serif);
  font-size: 1rem;
  font-weight: 700;
  color: var(--negro);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1.5px solid var(--gris-borde);
}
.ingredients {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.ingredients li {
  font-size: 0.85rem;
  color: var(--gris-texto);
  padding: 8px 12px;
  background: var(--bg-alt);
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  line-height: 1.4;
}
.ingredients li::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--rojo);
  border-radius: 50%;
  flex-shrink: 0;
}
.steps {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.steps li {
  display: flex;
  gap: 12px;
  font-size: 0.85rem;
  color: var(--gris-texto);
  line-height: 1.6;
  align-items: flex-start;
}
.step-num {
  width: 24px;
  height: 24px;
  background: var(--rojo);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
}
.modal-notes {
  font-size: 0.83rem;
  color: var(--gris-texto);
  line-height: 1.65;
  background: var(--amarillo-claro);
  padding: 12px 14px;
  border-radius: 10px;
  border-left: 3px solid var(--amarillo);
}

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: 82px;
  right: 24px;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: var(--rojo);
  color: white;
  font-size: 1.6rem;
  border: none;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(212,43,43,0.4);
  z-index: 150;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--sans);
  font-weight: 300;
  transition: transform 0.2s, background 0.15s;
  line-height: 1;
}
.fab:hover { background: var(--rojo-oscuro); transform: scale(1.07); }

/* ── TAB BAR ── */
.tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg);
  border-top: 1px solid var(--gris-borde);
  display: flex;
  z-index: 120;
  height: 62px;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--sans);
  padding: 8px 0 10px;
  transition: color 0.15s;
  position: relative;
}
.tab-item::before {
  content: '';
  position: absolute;
  top: 0; left: 28%; right: 28%;
  height: 2.5px;
  background: var(--rojo);
  border-radius: 0 0 3px 3px;
  opacity: 0;
  transition: opacity 0.15s;
}
.tab-item.active::before { opacity: 1; }
.tab-item .tab-icon { font-size: 1.25rem; line-height: 1; }
.tab-item .tab-label {
  font-size: 0.6rem;
  font-weight: 600;
  color: var(--gris-medio);
  letter-spacing: 0.04em;
}
.tab-item.active .tab-label { color: var(--rojo); }

/* ── VISTA MI PROGRESO ── */
#progress-view {
  display: none;
  padding: 24px 16px 140px;
}
.progress-section-title {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--negro);
  margin-bottom: 22px;
  text-align: center;
}
.donut-wrap {
  position: relative;
  width: 170px;
  height: 170px;
  margin: 0 auto 20px;
}
.donut-svg { width: 170px; height: 170px; }
.donut-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.donut-pct {
  font-size: 2rem;
  font-weight: 900;
  color: #22c55e;
  line-height: 1;
  font-family: var(--sans);
}
.donut-sub {
  font-size: 0.65rem;
  color: var(--gris-medio);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 4px;
}
.stats-grid {
  display: flex;
  gap: 10px;
  margin-bottom: 28px;
}
.stat-card {
  flex: 1;
  background: var(--bg-alt);
  border-radius: 14px;
  padding: 14px 10px;
  text-align: center;
  border: 1.5px solid var(--gris-borde);
}
.stat-card .stat-num {
  font-size: 1.8rem;
  font-weight: 900;
  color: var(--rojo);
  line-height: 1;
  display: block;
  margin-bottom: 4px;
}
.stat-card .stat-num.green { color: #22c55e; }
.stat-card .stat-lbl {
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--gris-medio);
}
.cooked-section-title {
  font-family: var(--serif);
  font-size: 1rem;
  font-weight: 700;
  color: var(--negro);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1.5px solid var(--gris-borde);
}
.cooked-list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--gris-borde);
  cursor: pointer;
  transition: opacity 0.15s;
}
.cooked-list-item:hover { opacity: 0.75; }
.cooked-list-emoji {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  background: #d4f5d4;
  flex-shrink: 0;
}
.cooked-list-info { flex: 1; min-width: 0; }
.cooked-list-name {
  font-family: var(--serif);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--negro);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cooked-list-cat {
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--rojo);
  margin-top: 2px;
}
.cooked-check {
  width: 26px;
  height: 26px;
  background: #22c55e;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 0.75rem;
  font-weight: 900;
  flex-shrink: 0;
}

/* ── FORM OVERLAY ── */
.form-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,26,26,0.55);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.form-overlay.open { opacity: 1; pointer-events: all; }
.form-modal {
  background: var(--bg);
  border-radius: 24px 24px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(40px);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.form-overlay.open .form-modal { transform: translateY(0); }
.form-modal h2 {
  font-family: var(--serif);
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 20px;
}
.form-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.form-header h2 { margin-bottom: 0; }
.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--gris-texto);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--gris-borde);
  border-radius: 10px;
  font-size: 0.88rem;
  font-family: var(--sans);
  color: var(--negro);
  background: var(--bg);
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--rojo); }
.field textarea { resize: vertical; min-height: 80px; }
.form-row { display: flex; gap: 10px; }
.form-row .field { flex: 1; }
.btn-save {
  width: 100%;
  background: var(--rojo);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 50px;
  font-size: 0.92rem;
  font-family: var(--sans);
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  box-shadow: 0 4px 12px rgba(212,43,43,0.3);
  transition: background 0.15s, transform 0.15s;
}
.btn-save:hover { background: var(--rojo-oscuro); transform: translateY(-1px); }
.btn-cancel {
  width: 100%;
  background: transparent;
  color: var(--gris-medio);
  border: 1.5px solid var(--gris-borde);
  padding: 12px;
  border-radius: 50px;
  font-size: 0.85rem;
  font-family: var(--sans);
  font-weight: 500;
  cursor: pointer;
  margin-top: 8px;
  transition: border-color 0.15s, color 0.15s;
}
.btn-cancel:hover { border-color: var(--negro); color: var(--negro); }

/* ── LOADING ── */
.loading {
  text-align: center;
  color: var(--gris-medio);
  padding: 60px 20px;
  font-size: 0.9rem;
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-top">
    <div class="header-title-wrap">
      <div class="header-label">Mi colección</div>
      <h1>Recetario</h1>
    </div>
    <span class="header-count" id="count">…</span>
  </div>
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar receta o ingrediente…" oninput="render()">
  </div>
</header>

<!-- VISTA PRINCIPAL: filtros + grid -->
<div id="main-view">
  <div class="filters-wrap">
    <div class="filter-row">
      <div class="filter-row-label"><span>🍽️</span> Tipo de plato</div>
      <div class="pills-scroll" id="pills-cat"></div>
    </div>
    <div class="filter-row">
      <div class="filter-row-label"><span>📚</span> Origen</div>
      <div class="pills-scroll" id="pills-org"></div>
    </div>
  </div>
  <div class="grid" id="grid"><div class="loading">Cargando recetas…</div></div>
</div>

<!-- VISTA MI PROGRESO -->
<div id="progress-view">
  <h2 class="progress-section-title">Mi progreso</h2>

  <div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 170 170" xmlns="http://www.w3.org/2000/svg">
      <circle cx="85" cy="85" r="62" fill="none" stroke="var(--gris-borde)" stroke-width="22"/>
      <circle id="donut-circle" cx="85" cy="85" r="62" fill="none" stroke="#22c55e" stroke-width="22"
        stroke-dasharray="0 389.6"
        stroke-dashoffset="97.4"
        stroke-linecap="round"
        style="transition: stroke-dasharray 0.6s ease;"/>
    </svg>
    <div class="donut-center">
      <span class="donut-pct" id="prog-pct">0%</span>
      <span class="donut-sub">cocinadas</span>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-num green" id="prog-cocinadas">0</span>
      <span class="stat-lbl">Cocinadas</span>
    </div>
    <div class="stat-card">
      <span class="stat-num" id="prog-pendientes">0</span>
      <span class="stat-lbl">Pendientes</span>
    </div>
    <div class="stat-card">
      <span class="stat-num" style="color:var(--gris-texto);" id="prog-total">0</span>
      <span class="stat-lbl">Total</span>
    </div>
  </div>

  <h3 class="cooked-section-title">✓ Recetas ya cocinadas</h3>
  <div id="cooked-recipe-list"></div>
</div>

<!-- Modal detalle -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"><div></div></div>
  </div>
</div>

<!-- Form nueva receta -->
<div class="form-overlay" id="formOverlay" onclick="closeForm(event)">
  <div class="form-modal">
    <div class="form-header">
      <h2>Nueva receta</h2>
      <button class="modal-close" onclick="document.getElementById('formOverlay').classList.remove('open')">✕</button>
    </div>
    <div class="field">
      <label>Nombre *</label>
      <input id="f-name" type="text" placeholder="Ej: Paella valenciana">
    </div>
    <div class="form-row">
      <div class="field">
        <label>Categoría *</label>
        <select id="f-cat">
          <option value="Entrante">Entrante</option>
          <option value="Principal">Principal</option>
          <option value="Postre">Postre</option>
          <option value="Desayuno">Desayuno</option>
          <option value="Bebida">Bebida</option>
          <option value="Salsa">Salsa, aliño o condimento</option>
          <option value="Acompañamiento">Acompañamiento</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
      <div class="field">
        <label>Emoji</label>
        <input id="f-emoji" type="text" placeholder="🍝" maxlength="2">
      </div>
    </div>
    <div class="field">
      <label>Subcategoría (origen)</label>
      <select id="f-subcat">
        <option value="">— Sin subcategoría —</option>
        <option value="Cocina asiática picante">Cocina asiática picante</option>
        <option value="Cocina taiwanesa">Cocina taiwanesa</option>
        <option value="Cocina tailandesa">Cocina tailandesa</option>
        <option value="Cocina turca">Cocina turca</option>
        <option value="Cocina coreana">Cocina coreana</option>
        <option value="Cocina mexicana">Cocina mexicana</option>
        <option value="Cocina siria">Cocina siria</option>
        <option value="Cocina del Magreb">Cocina del Magreb</option>
        <option value="Dumplings">Dumplings</option>
        <option value="Hofmann">Hofmann</option>
        <option value="Web">Web</option>
        <option value="Cocina india">Cocina india</option>
        <option value="Cocina asiática">Cocina asiática</option>
        <option value="Cocina latinoamericana">Cocina latinoamericana</option>
        <option value="Repostería árabe">Repostería árabe</option>
      </select>
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="f-type" onchange="toggleFields()">
        <option value="texto">Receta escrita</option>
        <option value="enlace">Enlace a web</option>
        <option value="pdf">PDF / Archivo</option>
      </select>
    </div>
    <div id="f-text-fields">
      <div class="field">
        <label>Ingredientes (uno por línea)</label>
        <textarea id="f-ingredients" placeholder="200g harina&#10;2 huevos&#10;1 limón…"></textarea>
      </div>
      <div class="field">
        <label>Pasos (uno por línea)</label>
        <textarea id="f-steps" placeholder="Mezclar harina con huevos&#10;Hornear 30 min…"></textarea>
      </div>
    </div>
    <div id="f-link-fields" style="display:none">
      <div class="field">
        <label>URL</label>
        <input id="f-url" type="url" placeholder="https://…">
      </div>
    </div>
    <div class="field">
      <label>Mis notas (opcional)</label>
      <input id="f-notes" type="text" placeholder="Ej: Doblar cantidades para 6 personas">
    </div>
    <button class="btn-save" onclick="saveRecipe()">Guardar receta</button>
    <button class="btn-cancel" onclick="document.getElementById('formOverlay').classList.remove('open')">Cancelar</button>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openForm()" aria-label="Añadir receta">+</button>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab-item active" id="tab-recetas" data-tab="recetas" onclick="switchTab('recetas')">
    <span class="tab-icon">📋</span>
    <span class="tab-label">Recetas</span>
  </button>
  <button class="tab-item" id="tab-progreso" data-tab="progreso" onclick="switchTab('progreso')">
    <span class="tab-icon">📊</span>
    <span class="tab-label">Mi progreso</span>
  </button>
</nav>

<script>
const CATS = ['Todas', 'Entrante', 'Principal', 'Postre', 'Desayuno', 'Bebida', 'Salsa', 'Acompañamiento', 'Otro'];
const CAT_LABELS = {
  Todas: 'Todas', Entrante: '🥗 Entrantes', Principal: '🍝 Principales',
  Postre: '🍮 Postres', Desayuno: '🥐 Desayunos', Bebida: '🥤 Bebidas',
  Salsa: '🫙 Salsas', Acompañamiento: '🥙 Acompañamientos', Otro: '📌 Otros'
};
const CAT_LABELS_PLAIN = {
  Todas: 'Todas', Entrante: 'Entrantes', Principal: 'Principales',
  Postre: 'Postres', Desayuno: 'Desayunos', Bebida: 'Bebidas',
  Salsa: 'Salsas y aliños', Acompañamiento: 'Acompañamientos', Otro: 'Otros'
};
const CAT_EMOJI = {
  Entrante: '🥗', Principal: '🍽️', Postre: '🍮',
  Desayuno: '🥐', Bebida: '🥤', Salsa: '🫙', Acompañamiento: '🥙', Otro: '📌'
};
const CAT_COLOR = {
  Entrante: 'color-rojo', Principal: 'color-naranja', Postre: 'color-amarillo',
  Desayuno: 'color-amarillo', Bebida: 'color-naranja', Salsa: 'color-rojo',
  Acompañamiento: 'color-naranja', Otro: 'color-rojo'
};
const TYPE_LABEL = { texto: 'Escrita', enlace: 'Web', pdf: 'PDF' };

const SUBCATS = [
  'Cocina asiática picante','Cocina taiwanesa','Cocina tailandesa','Cocina turca',
  'Cocina coreana','Cocina mexicana','Cocina siria','Cocina del Magreb',
  'Dumplings','Hofmann','Web','Cocina india','Cocina asiática',
  'Cocina latinoamericana','Repostería árabe'
];

const GITHUB_REPO = 'borjaemece/recetario';
const API_PROGRESO_URL = `https://api.github.com/repos/${GITHUB_REPO}/contents/progreso.json`;

let recipes = [];
let cocidas = new Set();
let progresoBlobSha = null;
let activeCat = 'Todas';
let activeOrg = 'Todos';

// ── CARGA INICIAL ──────────────────────────────────────────

async function loadRecipes() {
  try {
    const [recetasRes] = await Promise.all([
      fetch('recetas.json'),
      loadProgreso()
    ]);
    if (!recetasRes.ok) throw new Error();
    recipes = await recetasRes.json();
    const local = JSON.parse(localStorage.getItem('recetas_extra') || '[]');
    recipes = [...recipes, ...local];
    render();
  } catch (e) {
    recipes = JSON.parse(localStorage.getItem('recetas_extra') || '[]');
    render();
    if (recipes.length === 0) {
      document.getElementById('grid').innerHTML =
        '<div class="empty"><strong>Sin recetas todavía</strong>Pulsa + para añadir tu primera receta.</div>';
    }
  }
}

async function loadProgreso() {
  try {
    const res = await fetch(API_PROGRESO_URL, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res.ok) {
      const data = await res.json();
      progresoBlobSha = data.sha;
      const content = JSON.parse(atob(data.content.replace(/\n/g, '')));
      cocidas = new Set(content.cocinadas || []);
    }
  } catch (e) {
    cocidas = new Set();
  }
}

// ── TOKEN GITHUB ───────────────────────────────────────────

function getToken() {
  let token = sessionStorage.getItem('gh_token');
  if (!token) {
    token = prompt('Introduce tu token de GitHub para guardar el progreso:\n(Se guardará solo durante esta sesión del navegador)');
    if (token && token.trim()) {
      sessionStorage.setItem('gh_token', token.trim());
    } else {
      return null;
    }
  }
  return token;
}

// ── MARCAR / DESMARCAR COCINADA ────────────────────────────

async function toggleCocinada(id) {
  const token = getToken();
  if (!token) return;

  const eraCocinada = cocidas.has(id);
  if (eraCocinada) {
    cocidas.delete(id);
  } else {
    cocidas.add(id);
  }

  const ok = await saveProgreso(token);
  if (!ok) {
    // Revertir si falla
    if (eraCocinada) cocidas.add(id); else cocidas.delete(id);
    sessionStorage.removeItem('gh_token');
    alert('Error al guardar en GitHub. Puede que el token no sea válido o haya caducado. Inténtalo de nuevo.');
    return;
  }

  render();
  openModal(id);
}

async function saveProgreso(token) {
  try {
    const content = { cocinadas: [...cocidas] };
    const jsonStr = JSON.stringify(content, null, 2);
    const encoded = btoa(unescape(encodeURIComponent(jsonStr)));

    const body = {
      message: 'Actualizar progreso de recetas cocinadas',
      content: encoded
    };
    if (progresoBlobSha) body.sha = progresoBlobSha;

    const res = await fetch(API_PROGRESO_URL, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      const data = await res.json();
      progresoBlobSha = data.content.sha;
      return true;
    }
    return false;
  } catch (e) {
    return false;
  }
}

// ── NAVEGACIÓN ENTRE PESTAÑAS ──────────────────────────────

function switchTab(view) {
  const mainView = document.getElementById('main-view');
  const progressView = document.getElementById('progress-view');
  const fab = document.getElementById('fab');

  if (view === 'recetas') {
    mainView.style.display = '';
    progressView.style.display = 'none';
    fab.style.display = '';
  } else {
    mainView.style.display = 'none';
    progressView.style.display = '';
    fab.style.display = 'none';
    renderProgress();
  }

  document.querySelectorAll('.tab-item').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === view);
  });
  window.scrollTo(0, 0);
}

// ── RENDERIZAR PANTALLA DE PROGRESO ───────────────────────

function renderProgress() {
  const total = recipes.length;
  const cocinadasCount = cocidas.size;
  const pct = total > 0 ? Math.round(cocinadasCount / total * 100) : 0;

  document.getElementById('prog-cocinadas').textContent = cocinadasCount;
  document.getElementById('prog-pendientes').textContent = total - cocinadasCount;
  document.getElementById('prog-total').textContent = total;
  document.getElementById('prog-pct').textContent = pct + '%';

  // Actualizar gráfico donut (r=62, circunferencia = 2*PI*62 ≈ 389.6)
  const circ = 2 * Math.PI * 62;
  const dash = ((pct / 100) * circ).toFixed(1);
  const gap = (circ - parseFloat(dash)).toFixed(1);
  document.getElementById('donut-circle').setAttribute('stroke-dasharray', `${dash} ${gap}`);

  // Listado
  const cocinadasList = recipes.filter(r => cocidas.has(r.id));
  const listEl = document.getElementById('cooked-recipe-list');

  if (cocinadasList.length === 0) {
    listEl.innerHTML = '<div class="empty"><strong>Todavía no has cocinado ninguna</strong>Abre una receta y márcala como cocinada.</div>';
    return;
  }

  listEl.innerHTML = cocinadasList.map(r => `
    <div class="cooked-list-item" onclick="abrirDesdeProgreso(${r.id})">
      <div class="cooked-list-emoji">${r.emoji || CAT_EMOJI[r.categoria] || '🍴'}</div>
      <div class="cooked-list-info">
        <div class="cooked-list-name">${r.nombre}</div>
        <div class="cooked-list-cat">${CAT_LABELS_PLAIN[r.categoria] || r.categoria}${r.subcategoria ? ' · ' + r.subcategoria : ''}</div>
      </div>
      <div class="cooked-check">✓</div>
    </div>
  `).join('');
}

function abrirDesdeProgreso(id) {
  switchTab('recetas');
  setTimeout(() => openModal(id), 50);
}

// ── RENDER LISTA ───────────────────────────────────────────

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  document.getElementById('count').textContent = recipes.length + ' recetas';

  // Pills categoría
  const usedCats = new Set(recipes.map(r => r.categoria));
  const visibleCats = CATS.filter(c => c === 'Todas' || usedCats.has(c));
  document.getElementById('pills-cat').innerHTML = visibleCats.map(c =>
    `<button class="pill${c === activeCat ? ' active-cat' : ''}" onclick="setCat('${c}')">${CAT_LABELS[c] || c}</button>`
  ).join('');

  // Pills origen
  const recipesInCat = recipes.filter(r => activeCat === 'Todas' || r.categoria === activeCat);
  const usedOrgs = new Set(recipesInCat.map(r => r.subcategoria).filter(Boolean));
  const visibleOrgs = SUBCATS.filter(s => usedOrgs.has(s));
  const orgPillsEl = document.getElementById('pills-org');
  if (visibleOrgs.length > 0) {
    orgPillsEl.innerHTML =
      `<button class="pill${activeOrg === 'Todos' ? ' active-org' : ''}" onclick="setOrg('Todos')">Todos</button>` +
      visibleOrgs.map(s =>
        `<button class="pill${s === activeOrg ? ' active-org' : ''}" onclick="setOrg('${s}')">${s}</button>`
      ).join('');
    document.getElementById('pills-org').closest('.filter-row').style.display = '';
  } else {
    orgPillsEl.innerHTML = '<button class="pill active-org">Todos</button>';
  }

  // Filtrar
  const filtered = recipes.filter(r => {
    const matchCat = activeCat === 'Todas' || r.categoria === activeCat;
    const matchOrg = activeOrg === 'Todos' || r.subcategoria === activeOrg;
    const matchQ = !q || r.nombre.toLowerCase().includes(q) ||
      (r.ingredientes || []).some(i => i.toLowerCase().includes(q));
    return matchCat && matchOrg && matchQ;
  });

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><strong>Sin resultados</strong>Prueba con otro término o categoría.</div>';
    return;
  }

  grid.innerHTML = filtered.map(r => {
    const isCooked = cocidas.has(r.id);
    return `
      <div class="card" onclick="openModal(${r.id})">
        <div class="card-thumb ${CAT_COLOR[r.categoria] || 'color-rojo'}">
          ${r.emoji || CAT_EMOJI[r.categoria] || '🍴'}
          <span class="card-type-badge">${TYPE_LABEL[r.tipo] || r.tipo}</span>
          ${isCooked ? '<span class="card-cooked-dot">✓</span>' : ''}
        </div>
        <div class="card-body">
          <div class="card-cat">${CAT_LABELS_PLAIN[r.categoria] || r.categoria}${r.subcategoria ? ' · ' + r.subcategoria : ''}</div>
          <div class="card-name${isCooked ? ' cooked-name' : ''}">${r.nombre}</div>
          <div class="card-tags">
            ${r.dificultad ? `<span class="tag">${r.dificultad}</span>` : ''}
            ${r.porciones ? `<span class="tag">${r.porciones} porciones</span>` : ''}
            ${r.tiempoCoccion ? `<span class="tag">⏱ ${r.tiempoCoccion}</span>` : ''}
          </div>
        </div>
        <div class="card-arrow">›</div>
      </div>
    `;
  }).join('');
}

function setCat(c) { activeCat = c; activeOrg = 'Todos'; render(); }
function setOrg(s) { activeOrg = s; render(); }

// ── MODAL DETALLE ──────────────────────────────────────────

function openModal(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  const isCooked = cocidas.has(r.id);

  let html = `
    <div class="modal-handle"><div></div></div>
    <div class="modal-header">
      <button class="modal-close" onclick="document.getElementById('overlay').classList.remove('open')">✕</button>
    </div>
    <div class="modal-emoji">${r.emoji || CAT_EMOJI[r.categoria] || '🍴'}</div>
    <h2>${r.nombre}</h2>
    <div class="badges">
      <span class="badge">${CAT_LABELS_PLAIN[r.categoria] || r.categoria}</span>
      ${r.subcategoria ? `<span class="badge-sub">${r.subcategoria}</span>` : ''}
    </div>
    <button class="btn-cooked ${isCooked ? 'done' : 'pending'}" onclick="toggleCocinada(${r.id})">
      ${isCooked ? '✓&nbsp; Ya la he cocinado' : '○&nbsp; Marcar como cocinada'}
    </button>`;

  const metas = [];
  if (r.tiempoPrep) metas.push(`⏱ Prep: ${r.tiempoPrep}`);
  if (r.tiempoCoccion) metas.push(`🔥 Cocción: ${r.tiempoCoccion}`);
  if (r.porciones) metas.push(`🍽 ${r.porciones} porciones`);
  if (r.dificultad) metas.push(`${r.dificultad}`);
  if (metas.length) {
    html += `<div class="modal-meta">${metas.map(m => `<span class="meta-pill">${m}</span>`).join('')}</div>`;
  }

  if (r.historia) {
    html += `<p class="modal-historia">${r.historia}</p>`;
  }

  if (r.tipo === 'enlace' || r.tipo === 'pdf') {
    const icon = r.tipo === 'pdf' ? '📄' : '🔗';
    const label = r.tipo === 'pdf' ? 'Abrir PDF' : 'Ver receta en web';
    html += `<a class="modal-link" href="${r.url}" target="_blank">${icon} ${label}</a>`;
  } else {
    if (r.ingredientes?.length) {
      html += `<div class="modal-section"><h3>Ingredientes</h3><ul class="ingredients">
        ${r.ingredientes.map(i => `<li>${i}</li>`).join('')}
      </ul></div>`;
    }
    if (r.pasos?.length) {
      html += `<div class="modal-section"><h3>Elaboración</h3><ul class="steps">
        ${r.pasos.map((s, i) => `<li><span class="step-num">${i+1}</span><span>${s}</span></li>`).join('')}
      </ul></div>`;
    }
  }

  if (r.notas) {
    html += `<div class="modal-section"><h3>Mis notas</h3><p class="modal-notes">${r.notas}</p></div>`;
  }

  document.getElementById('modal').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}
function openForm() { document.getElementById('formOverlay').classList.add('open'); }
function closeForm(e) {
  if (e.target === document.getElementById('formOverlay'))
    document.getElementById('formOverlay').classList.remove('open');
}
function toggleFields() {
  const t = document.getElementById('f-type').value;
  document.getElementById('f-text-fields').style.display = t === 'texto' ? '' : 'none';
  document.getElementById('f-link-fields').style.display = t !== 'texto' ? '' : 'none';
}
function saveRecipe() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('El nombre es obligatorio'); return; }
  const type = document.getElementById('f-type').value;
  const r = {
    id: Date.now(),
    nombre: name,
    categoria: document.getElementById('f-cat').value,
    subcategoria: document.getElementById('f-subcat').value || undefined,
    emoji: document.getElementById('f-emoji').value.trim() || CAT_EMOJI[document.getElementById('f-cat').value],
    tipo: type,
    notas: document.getElementById('f-notes').value.trim()
  };
  if (type === 'texto') {
    r.ingredientes = document.getElementById('f-ingredients').value.split('\n').map(s => s.trim()).filter(Boolean);
    r.pasos = document.getElementById('f-steps').value.split('\n').map(s => s.trim()).filter(Boolean);
  } else {
    r.url = document.getElementById('f-url').value.trim();
  }
  const local = JSON.parse(localStorage.getItem('recetas_extra') || '[]');
  local.push(r);
  localStorage.setItem('recetas_extra', JSON.stringify(local));
  recipes.push(r);
  ['f-name','f-emoji','f-ingredients','f-steps','f-url','f-notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('f-type').value = 'texto';
  document.getElementById('f-subcat').value = '';
  toggleFields();
  document.getElementById('formOverlay').classList.remove('open');
  render();
}

loadRecipes();
</script>
</body>
</html>
